name: PCIeHighSpeedTester CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pciutils nvme-cli fio stress-ng build-essential

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Setup + Compile C Tool
        run: bash scripts/setup_env.sh

      - name: Run All Tests
        run: |
          python -m pytest tests/ -v --html=reports/report.html --self-contained-html || true
          bash scripts/performance_test.sh
          python src/analyze_results.py

      - name: Build Dashboard (Static Export)
        run: |
          echo "Dashboard ready (streamlit run dashboard.py in local)"

      - name: Upload Reports
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            reports/
            logs/
            *.html
          retention-days: 7
